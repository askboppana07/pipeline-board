  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

0;color:var(--muted);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:7px 15px;text-decoration:none;\">Integrations<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:40px;flex-wrap:wrap;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#4FB6E8;font-weight:600;\">DevSecOps · Release pipelines<\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif;font-size:38px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.03;margin-top:10px;\">Release pipeline <span style=\"color:#4FB6E8;\">control room<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;\">\n        <div style=\"text-align:right;\">\n          <div style=\"font-family:'Outfit',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);\">Now in motion<\u002Fdiv>\n          <div style=\"font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:var(--text);margin-top:3px;\">{{ activeStage }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:9px 16px;\">\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#34C281;animation:livepulse 1.6s infinite;\"><\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:var(--text);\">{{ now }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:5px 9px;\">Simulated view<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- data-state banner (loading / error / empty) -->\n    <sc-if value=\"{{ showDataBanner }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"{{ dataBannerStyle }}\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:currentColor;animation:livepulse 1.4s infinite;\"><\u002Fspan>\n        <span>{{ dataBannerText }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- control bar: glanceability + release switcher + freshness -->\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:26px;\">\n      <div style=\"{{ summaryStyle }}\">\n        <span style=\"{{ summaryGlyphStyle }}\">{{ summaryGlyph }}<\u002Fspan>\n        <span style=\"{{ summaryTextStyle }}\">{{ summaryText }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n        <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;\">\n          <span style=\"font-family:'Outfit',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);\">Release<\u002Fspan>\n          <sc-for list=\"{{ releaseTabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ t.onClick }}\" onkeydown=\"{{ t.onKey }}\" role=\"button\" tabindex=\"0\" aria-label=\"{{ t.name }}\" style=\"{{ t.style }}\"><span style=\"{{ t.dotStyle }}\"><\u002Fspan>{{ t.name }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;flex-wrap:wrap;\">\n          <sc-for list=\"{{ sourceSyncs }}\" as=\"sc\" hint-placeholder-count=\"1\">\n            <span style=\"{{ sc.chipStyle }}\"><span style=\"{{ sc.dotStyle }}\"><\u002Fspan>{{ sc.name }} · {{ sc.label }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div onclick=\"{{ onRefresh }}\" onkeydown=\"{{ onRefreshKey }}\" role=\"button\" tabindex=\"0\" title=\"Refresh now\" aria-label=\"Refresh now\" style=\"displa >\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px 26px;margin-top:34px;font-family:'Outfit',sans-serif;font-size:12px;color:var(--muted);align-items:center;\">\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:16px;height:16px;border-radius:50%;background:#1F8A5B;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#eafff4;\">✓<\u002Fspan>Deployed<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:16px;height:16px;border-radius:50%;background:#0085CA;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#eaf6ff;\">⟳<\u002Fspan>Deploying<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:16px;height:16px;border-radius:50%;background:var(--panel);border:2px solid #AEBCCC;\"><\u002Fspan>Queued<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:16px;height:16px;border-radius:50%;background:#F2A900;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#3a2a00;\">‖<\u002Fspan>Standby branch<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:15px;height:15px;border-radius:3px;background:#1F8A5B;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;\">✓<\u002Fspan>Gate — pass<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:15px;height:15px;border-radius:3px;background:#0085CA;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;\">⟳<\u002Fspan>Gate — scanning<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:16px;height:16px;border-radius:50%;background:#C8102E;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;\">!<\u002Fspan>Blocked — dev notified<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:18px;height:0;border-top:2px solid #1F8A5B;\"><\u002Fspan>Prod → Training + Prod Fix<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:18px;height:0;border-top:2px dashed #F2A900;\"><\u002Fspan>Hotfix → Prod (return)<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-family:'Outfit',sans-serif;font-size:11.5px;color:var(--muted);margin-top:11px;line-height:1.5;max-width:1000px;\">If a DevSecOps gate fails, the deployment is <b style=\"color:#E0758A;font-weight:600;\">blocked for that user story or defect<\u002Fb> — the dev team is notified.<\u002Fdiv>\n\n    <!-- ===================== WORK ITEMS FINDER ===================== -->\n    <div style=\"margin-top:34px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px 24px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04);\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;\">\n          <div style=\"font-family:'Archivo',sans-serif;font-size:19px;font-weight:700;color:var(--text);\">Find your work — {{ releaseName }}<\u002Fdiv>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);\">{{ resultCount }} shown<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"position:relative;\">\n          <span style=\"position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;\">⌕<\u002Fspan>\n          <input type=\"text\" value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"Find a story or defect…\" style=\"font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:9px 14px 9px 32px;width:260px;outline:none;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px;\">\n        <sc-for list=\"{{ workItems }}\" as=\"w\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--text);flex:none;width:74px;\">{{ w.id }}<\u002Fspan>\n            <span style=\"font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);flex:1;min-width:0;\">{{ w.title }}<\u002Fspan>\n            <span style=\"{{ w.srcStyle }}\">{{ w.source }}<\u002Fspan>\n            <span style=\"font-family:'Outfit',sans-serif;font-size:10px;color:var(--muted);flex:none;width:46px;\">{{ w.type }}<\u002Fspan>\n            <span style=\"{{ w.badgeStyle }}\"><span>{{ w.glyph }}<\u002Fspan>{{ w.stateLabel }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:26px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--muted);\">No story or defect matches “{{ query }}”. Try an ID like US-1043, or a source name.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===================== BRANCHING STRATEGY (Salesforce) ===================== -->\n    <sc-if value=\"{{ isSalesforce }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"margin-top:54px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#4FB6E8;font-weight:600;\">Branching strategy<\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-size:30px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.04;margin-top:9px;\">How branches stay <span style=\"color:#4FB6E8;\">in sync<\u002Fspan><\u002Fdiv>\n\n      <!-- Panel C — forward promotion & hotfix flow -->\n      <div style=\"margin-top:28px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px 26px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04);\">\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <span style=\"width:28px;height:28px;border-radius:8px;background:rgba(143,176,216,.14);border:1px solid rgba(143,176,216,.45);color:#9FB8DA;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;\">01<\u002Fspan>\n          <div style=\"font-family:'Archivo',sans-serif;font-size:19px;font-weight:700;color:var(--text);\">Forward promotion &amp; hotfix flow<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Outfit',sans-serif;font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:9px;max-width:860px;\">The <b style=\"color:#cfe0f2;font-weight:600;\">main pipeline<\u002Fb> promotes code forward — each sandbox has its own branch (developer → devint → qa → uat → main), mirroring the train above. An <b style=\"color:var(--btext);font-weight:600;\">urgent hotfix<\u002Fb> takes its own lane: merge the developer branch into the <b style=\"color:#cfe0f2;font-weight:600;\">Prod Fix branch<\u002Fb>, validate it in the Prod Fix org, and ship to Production. Dev teams are then <b style=\"color:var(--btext);font-weight:600;\">responsible for coordinating the merge back into the main pipeline.<\u002Fb><\u002Fdiv>\n\n        <svg viewBox=\"0 0 1200 250\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:auto;margin-top:14px;overflow:visible;\">\n          <defs>\n            <marker id=\"fwd\" markerWidth=\"8\" markerHeight=\"8\" refX=\"5.5\" refY=\"3\" orient=\"auto\"><path d=\"M0 0 L6 3 L0 6 Z\" fill=\"#4FB6E8\"><\u002Fpath><\u002Fmarker>\n            <marker id=\"grn\" markerWidth=\"8\" markerHeight=\"8\" refX=\"5.5\" refY=\"3\" orient=\"auto\"><path d=\"M0 0 L6 3 L0 6 Z\" fill=\"#2BA46F\"><\u002Fpath><\u002Fmarker>\n            <marker id=\"bm\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0 0 L6.5 3 L0 6 Z\" fill=\"#F2A900\"><\u002Fpath><\u002Fmarker>\n          <\u002Fdefs>\n\n          <!-- row labels -->\n          <text x=\"8\" y=\"74\" font-family=\"'JetBrains Mono', monospace\" font-size=\"9.5\" letter-spacing=\"1.5\" fill=\"#5B8AA6\">MAIN<\u002Ftext>\n          <text x=\"8\" y=\"200\" font-family=\"'JetBrains Mono', monospace\" font-size=\"9.5\" letter-spacing=\"1.5\" fill=\"#3FA47A\">HOTFIX<\u002Ftext>\n\n          <!-- MAIN pipeline (forward promotion) — one branch per environment, mirrors the train -->\n          <line x1=\"120\" y1=\"70\" x2=\"296\" y2=\"70\" stroke=\"#2E4A6B\" stroke-width=\"2.5\" marker-end=\"url(#fwd)\"><\u002Fline>\n          <line x1=\"315\" y1=\"70\" x2=\"491\" y2=\"70\" stroke=\"#2E4A6B\" stroke-width=\"2.5\" marker-end=\"url(#fwd)\"><\u002Fline>\n          <line x1=\"510\" y1=\"70\" x2=\"686\" y2=\"70\" stroke=\"#2E4A6B\" stroke-width=\"2.5\" marker-end=\"url(#fwd)\"><\u002Fline>\n          <line x1=\"705\" y1=\"70\" x2=\"881\" y2=\"70\" stroke=\"#2E4A6B\" stroke-width=\"2.5\" marker-end=\"url(#fwd)\"><\u002Fline>\n          <circle r=\"4.5\" fill=\"#7fe0ff\"><animateMotion dur=\"1.8s\" repeatCount=\"indefinite\" path=\"M124 70 H292\"><\u002FanimateMotion><animate attributeName=\"opacity\" dur=\"1.8s\" values=\"0;1;1;0\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n          <circle r=\"4.5\" fill=\"#7fe0ff\"><animateMotion dur=\"2.0s\" repeatCount=\"indefinite\" path=\"M319 70 H487\"><\u002FanimateMotion><animate attributeName=\"opacity\" dur=\"2.0s\" values=\"0;1;1;0\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n          <circle r=\"4.5\" fill=\"#7fe0ff\"><animateMotion dur=\"1.9s\" repeatCount=\"indefinite\" path=\"M514 70 H682\"><\u002FanimateMotion><animate attributeName=\"opacity\" dur=\"1.9s\" values=\"0;1;1;0\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n          <circle r=\"4.5\" fill=\"#7fe0ff\"><animateMotion dur=\"2.1s\" repeatCount=\"indefinite\" path=\"M709 70 H877\"><\u002FanimateMotion><animate attributeName=\"opacity\" dur=\"2.1s\" values=\"0;1;1;0\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n\n          <text x=\"208\" y=\"56\" text-anchor=\"middle\" font-family=\"Outfit, sans-serif\" font-size=\"10.5\" fill=\"#8AA0BD\">PR merge<\u002Ftext>\n          <text x=\"403\" y=\"56\" text-anchor=\"middle\" font-family=\"Outfit, sans-serif\" font-size=\"10.5\" fill=\"#8AA0BD\">promote<\u002Ftext>\n          <text x=\"598\" y=\"56\" text-anchor=\"middle\" font-family=\"Outfit, sans-serif\" font-size=\"10.5\" fill=\"#8AA0BD\">promote<\u002Ftext>\n          <text x=\"793\" y=\"56\" text-anchor=\"middle\" font-family=\"Outfit, sans-serif\" font-size=\"10.5\" fill=\"#8AA0BD\">promote → Prod<\u002Ftext>\n\n          <circle cx=\"110\" cy=\"70\" r=\"7\" fill=\"var(--panel)\" stroke=\"#4FB6E8\" stroke-width=\"3\"><\u002Fcircle>\n          <circle cx=\"305\" cy=\"70\" r=\"7\" fill=\"var(--panel)\" stroke=\"#4FB6E8\" stroke-width=\"3\"><\u002Fcircle>\n          <circle cx=\"500\" cy=\"70\" r=\"7\" fill=\"var(--panel)\" stroke=\"#57A8E0\" stroke-width=\"3\"><\u002Fcircle>\n          <circle cx=\"695\" cy=\"70\" r=\"7\" fill=\"var(--panel)\" stroke=\"#2E86D6\" stroke-width=\"3\"><\u002Fcircle>\n          <circle cx=\"890\" cy=\"70\" r=\"7\" fill=\"var(--panel)\" stroke=\"#8FB0D8\" stroke-width=\"3\"><\u002Fcircle>\n          <text x=\"110\" y=\"93\" text-anchor=\"middle\" font-family=\"'JetBrains Mono', monospace\" font-size=\"11\" fill=\"#B9C8DB\">developer/*<\u002Ftext>\n          <text x=\"305\" y=\"93\" text-anchor=\"middle\" font-family=\"'JetBrains Mono', monospace\" font-size=\"11\" fill=\"#B9C8DB\">devint<\u002Ftext>\n          <text x=\"500\" y=\"93\" text-anchor=\"middle\ -:--:--', selectedRelease: 0, selectedPipeline: 0, query: '', lastSyncTs: Date.now() };\n\n  pipelineConfigs() {\n    return [\n      { key: 'sf', tech: 'Salesforce', color: '#00A1E0', name: 'Salesforce', source: 'Salesforce + Jira', sources: ['Salesforce', 'Jira'], current: 1,\n        envs: [{ name: 'Dev Orgs', owner: 'Base + Project' }, { name: 'DevInt & Refresh', owner: 'DevOps' }, { name: 'QA', owner: 'QA + DevOps' }, { name: 'UAT', owner: 'Biz + Project' }, { name: 'Production', owner: 'Release · DevOps' }],\n        fork: [{ name: 'Training', owner: 'Enablement', note: 'Training sandbox' }, { name: 'Prod Fix', owner: 'Base team', note: 'Hotfix sandbox' }],\n        gates: [{ label: 'PMD / SAST', sub: 'Static analysis', when: 0 }, { label: 'Coverage 75%', sub: 'Apex test gate', when: 2 }, { label: 'Security sign-off', sub: 'Manual approval', when: 3 }],\n        hotfix: true, mergeNote: true,\n        releases: [\n          { key: 'r24', name: 'Release 2.4', source: 'Both', items: [\n            { id: 'US-1043', title: 'Quote PDF export', type: 'Story', source: 'Salesforce', st: 'deploying' },\n            { id: 'US-1039', title: 'Bulk RA bill run', type: 'Story', source: 'Salesforce', st: 'deployed' },\n            { id: 'DF-220', title: 'Tax rounding error', type: 'Defect', source: 'Salesforce', st: 'blocked', reason: 'Validation failed' },\n            { id: 'US-2210', title: 'Portal filters', type: 'Story', source: 'Jira', st: 'deploying' },\n            { id: 'DF-118', title: 'Login retry loop', type: 'Defect', source: 'Jira', st: 'deployed' },\n            { id: 'US-2231', title: 'Audit log export', type: 'Story', source: 'Jira', st: 'queued' }\n          ] },\n          { key: 'hot', name: 'Hotfix 2.3.1', source: 'Salesforce', items: [\n            { id: 'DF-305', title: 'Prod checkout outage', type: 'Defect', source: 'Salesforce', st: 'deploying' },\n            { id: 'DF-306', title: 'GST calc mismatch', type: 'Defect', source: 'Salesforce', st: 'blocked', reason: 'Approval rejected' }\n          ] }\n        ] },\n      { key: 'uip', tech: 'UiPath', color: '#FA4616', name: 'RPA · Bot Suite', source: 'Jira', sources: ['Jira'], current: 2,\n        envs: [{ name: 'Dev', owner: 'RPA devs' }, { name: 'Test', owner: 'RPA QA' }, { name: 'UAT', owner: 'Business' }, { name: 'Prod Orchestrator', owner: 'RPA Ops' }],\n        fork: [], gates: [{ label: 'Workflow lint', sub: 'Static analysis', when: 0 }], hotfix: false, mergeNote: false,\n        releases: [\n          { key: 'b17', name: 'Bots 1.7', source: 'Jira', items: [\n            { id: 'RPA-88', title: 'Invoice bot v2', type: 'Story', source: 'Jira', st: 'deploying' },\n            { id: 'RPA-91', title: 'Reconcile queue', type: 'Story', source: 'Jira', st: 'deployed' },\n            { id: 'RPA-77', title: 'Retry on timeout', type: 'Defect', source: 'Jira', st: 'queued' }\n          ] }\n        ] },\n      { key: 'si', tech: 'Integrations', color: '#5B8AA6', name: 'System Integrations', source: 'Jira', sources: ['Jira'], current: 3,\n        envs: [{ name: 'Dev', owner: 'Integration devs' }, { name: 'QA', owner: 'QA' }, { name: 'Pre-Prod', owner: 'Release' }, { name: 'Prod', owner: 'Ops' }],\n        fork: [], gates: [{ label: 'Contract tests', sub: 'API schema', when: 1 }], hotfix: false, mergeNote: false,\n        releases: [\n          { key: 'esb42', name: 'ESB 4.2', source: 'Jira', items: [\n            { id: 'INT-210', title: 'Claims API v3', type: 'Story', source: 'Jira', st: 'deploying' },\n            { id: 'INT-204', title: 'Member sync SLA', type: 'Defect', source: 'Jira', st: 'blocked', reason: 'Validation failed' },\n            { id: 'INT-215', title: 'Retry dead-letter', type: 'Defect', source: 'Jira', st: 'blocked', reason: 'Approval rejected' },\n            { id: 'INT-198', title: 'Eligibility map', type: 'Story', source: 'Jira', st: 'deployed' }\n          ] }\n        ] },\n      { key: 'data', tech: 'Data', color: '#7A8B6F', name: 'Data Platform', source: 'Jira', sources: ['Jira'], current: 1,\n        envs: [{ name: 'Dev', owner: 'Data eng' }, { name: 'Test', owner: 'Data QA' }, { name: 'Prod', owner: 'Data Ops' }],\n        fork: [], gates: [], hotfix: false, mergeNote: false,\n        releases: [\n          { key: 'etl31', name: 'ETL 3.1', source: 'Jira', items: [\n            { id: 'DAT-40', title: 'Claims warehouse load', type: 'Story', source: 'Jira', st: 'deploying' },\n            { id: 'DAT-42', title: 'Late-arriving dims', type: 'Story', source: 'Jira', st: 'queued' }\n          ] }\n        ] },\n      { key: 'mob', tech: 'Mobile', color: '#A100FF', name: 'Mobile App', source: 'Jira', sources: ['Jira'], current: 2,\n        envs: [{ name: 'Dev', owner: 'Mobile devs' }, { name: 'QA', owner: 'Mobile QA' }, { name: 'Beta', owner: 'TestFlight' }, { name: 'Prod', owner: 'Release' }],\n        fork: [], gates: [], hotfix: false, mergeNote: false,\n        releases: [\n          { key: 'app54', name: 'App 5.4', source: 'Jira', items: [\n            { id: 'MOB-12', title: 'Biometric login', type: 'Story', source: 'Jira', st: 'deploying' },\n            { id: 'MOB-15', title: 'Offline drafts', type: 'Story', source: 'Jira', st: 'deployed' }\n          ] }\n        ] }\n    ];\n  }\n  selectedConfig() { const a = this.pipelineConfigs(); return a[Math.min(this.state.selectedPipeline || 0, a.length - 1)]; }\n  stepCount() { const c = this.selectedConfig(); return c.envs.length + ((c.fork || []).length ? 1 : 0); }\n\n  paceMs() {\n    const p = this.props.pace || 'Standard';\n    return p === 'Brisk' ? 1500 : p === 'Calm' ? 3200 : 2200;\n  }\n\n  startTick() {\n    clearInterval(this._tick);\n    if (this.props.autoplay !== false) {\n      this._tick = setInterval(() => {\n        this.setState(s => ({ step: (s.step + 1) % this.stepCount(), lastSyncTs: Date.now() }));\n      }, this.paceMs());\n    }\n  }\n\n  selectRelease(i) { this.setState({ selectedRelease: i, query: '' }); }\n  selectPipeline(i) {\n    const cfgs = this.pipelineConfigs();\n    const key = cfgs[i] ? cfgs[i].key : '';\n    try { if (key) history.replaceState(null, '', '#pipeline=' + key); } catch (e) {}\n    this.setState({ selectedPipeline: i, selectedRelease: 0, step: 0, query: '', lastSyncTs: Date.now() });\n  }\n  onSearch(e) { const v = (e && e.target) ? e.target.value : ''; this.setState({ query: v }); }\n  refreshNow() { this.setState({ lastSyncTs: Date.now() }); }\n  keyAct(fn) { return (e) => { if (e && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); fn(); } }; }\n\n  themes() {\n    // dark palette (default)\n    const DARK = { panel: '#0E2038', panel2: '#0B1B30', border: '#1C2E45', text: '#EAF1FA', muted: '#9FB0C6' };\n    // light palette\n    const LIGHTW = { panel: '#FFFFFF', panel2: '#F4F7FB', border: '#DEE6F1', text: '#0F2E4E', muted: '#5A6B82' };\n    const LIGHTC = { panel: '#FBF7EF', panel2: '#F3ECDD', border: '#E7DEC9', text: '#173250', muted: '#5E6B7E' };\n    return {\n      'Midnight':   { bg: 'radial-gradient(125% 95% at 28% -12%, #21486F 0%, #122E49 62%)', pal: DARK },\n      'Deep Slate': { bg: 'radial-gradient(125% 95% at 28% -12%, #2E3947 0%, #171D26 62%)', pal: DARK },\n      'Teal Night': { bg: 'radial-gradient(125% 95% at 28% -12%, #124A42 0%, #0C2A2C 62%)', pal: DARK },\n      'Indigo':     { bg: 'radial-gradient(125% 95% at 28% -12%, #363371 0%, #1A1838 62%)', pal: DARK },\n      'Steel Blue': { bg: 'radial-gradient(125% 95% at 28% -12%, #3C4E69 0%, #1F2C40 62%)', pal: DARK },\n      'Sky Steel':  { bg: 'radial-gradient(125% 95% at 28% -12%, #5A7EA8 0%, #3C5A82 62%)', pal: DARK },\n      'Arctic White': { bg: 'radial-gradient(130% 100% at 26% -14%, #FFFFFF 0%, #E8EFF8 60%, #DCE7F4 100%)', pal: LIGHTW, light: true },\n      'Cream':        { bg: 'radial-gradient(130% 100% at 26% -14%, #FFFDF8 0%, #F5EEE0 60%, #EEE4D2 100%)', pal: LIGHTC, light: true }\n    };\n  }\n  applyTheme() {\n    const root = document.getElementById('boardRoot');\n    if (!root) return;\n    const cfg = this.themes()[this.props.theme || 'Midnight'] || this.themes()['Midnight'];\n    root.style.background = cfg.bg;\n    const p = cfg.pal;\n    root.style.setProperty('--panel', p.panel);\n    root.style.setProperty('--panel2', p.panel2);\n    root.style.setProperty('--border', p.border);\n    root.style.setProperty('--text', p.text);\n    root.style.setProperty('--muted', p.muted);\n    root.style.setProperty('--btext', cfg.light ? '#6E4E06' : '#FBEBC8');\n    root.style.setProperty('--btext2', cfg.light ? '#6B5A34' : '#D7C9A6');\n    root.setAttribute('data-mode', cfg.light ? 'light' : 'dark');\n  }\n\n  clock() {\n    const d = new Date();\n    const p = n => String(n).padStart(2, '0');\n    this.setState({ now: p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds()) });\n  }\n\n  componentDidMount() {\n    this.clock();\n    this._clock = setInterval(() => this.clock(), 1000);\n    const m = (location.hash || '').match(/pipeline=([a-z0-9]+)/i);\n    if (m) { const idx = this.pipelineConfigs().findIndex(p => p.key === m[1]); if (idx >= 0) this.setState({ selectedPipeline: idx }); }\n    this.startTick();\n    this.setupFit();\n    this.applyTheme();\n  }\n\n  setupFit() {\n    const DESIGN_W = 1340;\n    const root = document.getElementById('boardRoot');\n    const inner = document.getElementById('boardInner');\n    if (!root || !inner) return;\n\n    const fit = () => {\n      const vw = document.documentElement.clientWidth || window.innerWidth;\n      if (vw < DESIGN_W + 24) {\n        // scale the fixed-width board down to fit the phone screen\n        const pad = 12;\n        root.style.padding = pad + 'px';\n        const avail = vw - pad * 2;\n        const scale = avail / DESIGN_W;\n        inner.style.width = DESIGN_W + 'px';\n        inner.style.maxWidth = 'none';\n        inner.style.margin = '0';\n        inner.style.transformOrigin = 'top left';\n        inner.style.transform = 'scale(' + scale + ')';\n        // collapse the layout gap left by the transform\n        inner.style.height = 'auto';\n        const realH = inner.getBoundingClientRect().height / scale;\n        root.style.height = (realH * scale + pad * 2 + 40) + 'px';\n        root.style.minHeight = '0';\n      } else {\n        // desktop — restore original layout\n        root.style.padding = '44px 36px 52px';\n        root.style.height = '';\n        root.style.minHeight = '100vh';\n        inner.style.width = '';\n        inner.style.maxWidth = '1340px';\n        inner.style.margin = '0 auto';\n        inner.style.transform = '';\n        inner.style.height = '';\n      }\n    };\n\n    this._fit = fit;\n    fit();\n    setTimeout(fit, 400);   // re-fit after fonts settle\n    window.addEventListener('resize', fit);\n  }\n\n  componentDidUpdate(prev) {\n    if (prev.pace !== this.props.pace || prev.autoplay !== this.props.autoplay) {\n      this.startTick();\n    }\n    if (this._fit) this._fit();\n    this.applyTheme();\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._clock);\n    clearInterval(this._tick);\n    if (this._fit) window.removeEventListener('resize', this._fit);\n  }\n\n  renderVals() {\n    const step = this.state.step;\n    const LIVE = '#0085CA', DONE = '#1F8A5B', QUEUE = '#AEBCCC', STANDBY = '#F2A900';\n    const trans = 'left 1.25s cubic-bezier(.45,.02,.2,1), top 1.25s cubic-bezier(.45,.02,.2,1), opacity .5s ease';\n\n    const RED = '#C8102E';\n    const isLight = !!(this.themes()[this.props.theme || 'Midnight'] || {}).light;\n    const okText = isLight ? '#0C7A4B' : '#B7E9CF';\n    const badText = isLight ? '#B01030' : '#F4B8C1';\n    const glowFor = c => c === LIVE ? 'rgba(0,133,202,.6)' : c === DONE ? 'rgba(31,138,91,.55)' : c === RED ? 'rgba(200,16,46,.6)' : 'rgba(174,188,204,.35)';\n    const dotBase = 'width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;';\n    const dotStyleFor = (bg, hollow) => dotBase + (hollow ? ('background:var(--panel);border:2px solid ' + bg + ';') : ('background:' + bg + ';')) + 'box-shadow:0 0 0 4px rgba(8,18,32,.6),0 0 16px ' + glowFor(bg) + ';';\n    const glyphStyleFor = (color) => \"font-family:'Outfit',sans-serif;font-size:10px;font-weight:800;line-height:1;color:\" + color + \";\";\n\n    // ----- selected pipeline drives the detailed track (config-driven, flexible) -----\n    const cfg = this.selectedConfig();\n    const hasFork = (cfg.fork || []).length > 0;\n    const noFork = !hasFork;\n    const isSalesforce = cfg.key === 'sf';\n    const showMergeNote = !!cfg.mergeNote;\n    const endX = hasFork ? 850 : 1080;\n    const nEnv = cfg.envs.length;\n    const pctAt = i => ((60 + (endX - 60) * (nEnv <= 1 ? 0 : i / (nEnv - 1))) / 1140 * 100);\n    const splitting = hasFork && step >= nEnv;\n    const onMain = step < nEnv;\n    const activeStage = onMain ? cfg.envs[step].name : 'Prod Fix & Training';\n\n    const mainStations = cfg.envs.map((e, i) => {\n      let dot, status, glyph, glyphStyle, dotStyle;\n      if (step > i)       { dot = DONE;  status = 'Deployed';   glyph = '✓'; dotStyle = dotStyleFor(DONE, false);  glyphStyle = glyphStyleFor('#eafff4'); }\n      else if (step === i){ dot = LIVE;  status = 'Deploying…'; glyph = '⟳'; dotStyle = dotStyleFor(LIVE, false);  glyphStyle = glyphStyleFor('#eaf6ff'); }\n      else                { dot = QUEUE; status = 'Queued';     glyph = '';  dotStyle = dotStyleFor(QUEUE, true);  glyphStyle = glyphStyleFor(QUEUE); }\n      return { name: e.name, owner: e.owner, left: pctAt(i) + '%', dot, status, glyph, glyphStyle, dotStyle };\n    });\n\n    const branchStations = (cfg.fork || []).map((b, i) => {\n      const dep = splitting;\n      return { name: b.name, owner: b.owner, note: b.note, left: '94.7%', top: (i === 0 ? '29.2%' : '70.8%'),\n        status: dep ? 'Deploying' : 'Standby', glyph: dep ? '⟳' : '‖',\n        dotStyle: dotStyleFor(dep ? LIVE : STANDBY, false), glyphStyle: glyphStyleFor(dep ? '#eaf6ff' : '#3a2a00') };\n    });\n\n    const gateGlyphStyle = \"font-family:'Outfit',sans-serif;font-size:9px;font-weight:800;line-height:1;color:#fff;\";\n    const gates = (cfg.gates || []).map(g => {\n      const scanning = step === g.when;\n      const base = { width: '17px', height: '17px', borderRadius: '4px', border: '2px solid var(--panel)', display: 'flex', alignItems: 'center', justifyContent: 'center' };\n      const ringDark = scanning\n        ? Object.assign({}, base, { background: '#0085CA', animation: 'gatepulse 1.3s infinite' })\n        : Object.assign({}, base, { background: DONE, boxShadow: '0 0 10px rgba(31,138,91,.55)' });\n      const gp = (g.when + 1 < nEnv) ? ((pctAt(g.when) + pctAt(g.when + 1)) / 2) : pctAt(g.when);\n      return { label: g.label, sub: g.sub, left: gp + '%', scanning, ringDark, glyph: scanning ? '⟳' : '✓', glyphStyle: gateGlyphStyle };\n    });\n\n    const wrap = (leftStr, top, opacity) => ({\n      position: 'absolute', left: leftStr, top: top, transform: 'translate(-50%,-50%)',\n      zIndex: 6, opacity: opacity, transition: trans, pointerEvents: 'none'\n    });\n    const mainTrainStyle  = wrap(onMain ? (pctAt(step) + '%') : (pctAt(nEnv - 1) + '%'), '50%', onMain ? 1 : 0);\n    const trainTrainStyle = wrap('94.7%', '29.2%', splitting ? 1 : 0);\n    const fixTrainStyle   = wrap('94.7%', '70.8%', splitting ? 1 : 0);\n\n    // ---------- portfolio: every technology pipeline (config-driven, scales to N) ----------\n    const pipelines = this.pipelineConfigs();\n    const selPipe = Math.min(this.state.selectedPipeline || 0, pipelines.length - 1);\n    const blockedOf = p => (p.releases || []).reduce((n, r) => n + r.items.filter(it => it.st === 'blocked').length, 0);\n    const portfolioCards = pipelines.map((p, pi) => {\n      const bcount = blockedOf(p);\n      const attn = bcount > 0;\n      const isSel = pi === selPipe;\n      const liveCur = isSel ? Math.min(this.state.step, p.envs.length - 1) : p.current;\n      const dots = p.envs.map((e, i) => {\n        if (i < liveCur)  return { glyph: '✓', style: 'width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;background:' + DONE + ';color:#eafff4;' };\n        if (i === liveCur) return { glyph: '⟳', style: 'width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;background:' + LIVE + ';color:#eaf6ff;' };\n        return { glyph: '', style: 'width:15px;height:15px;border-radius:50%;background:var(--panel);border:2px solid ' + QUEUE + ';' };\n      });\n      return {\n        key: p.key, tech: p.tech, name: p.name, release: (p.releases && p.releases[0] ? p.releases[0].name : '—'),\n        stageLabel: (p.envs[liveCur] && p.envs[liveCur].name) || '—',\n        dots,\n        note: isSel ? 'Showing below ↓' : 'View detail →',\n        onClick: () => this.selectPipeline(pi),\n        onKey: this.keyAct(() => this.selectPipeline(pi)),\n        cardStyle: 'display:block;cursor:pointer;text-decoration:none;background:var(--panel);border:1px solid ' + (isSel ? p.color : 'var(--border)') + ';border-top:3px solid ' + p.color + ';border-radius:14px;padding:16px 18px;box-shadow:' + (isSel ? ('0 0 0 1px ' + p.color + ',inset 0 1px 0 rgba(255,255,255,.04)') : 'inset 0 1px 0 rgba(255,255,255,.04)') + ';',\n        techStyle: 'font-family:\\'JetBrains Mono\\',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;color:' + p.color + ';background:' + p.color + '1c;border:1px solid ' + p.color + '44;border-radius:5px;padding:3px 8px;',\n        healthGlyph: attn ? '!' : '✓',\n        healthLabel: attn ? (bcount + ' blocked') : 'On track',\n        healthStyle: 'display:inline-flex;align-items:center;gap:5px;font-family:\\'Outfit\\',sans-serif;font-size:10.5px;font-weight:600;color:' + (attn ? badText : okText) + ';background:' + (attn ? 'rgba(200,16,46,.14)' : 'rgba(52,194,129,.14)') + ';border:1px solid ' + (attn ? 'rgba(200,16,46,.4)' : 'rgba(52,194,129,.4)') + ';border-radius:20px;padding:2px 9px;'\n      };\n    });\n\n    const stageNames = ['Dev Orgs', 'DevInt & Refresh', 'QA', 'UAT', 'Production', 'Prod Fix & Training'];\n\n    // ---------- work-item state vocabulary (with non-color glyphs) ----------\n    const WI = {\n      deployed:  { label: 'Deployed',  color: DONE,  glyph: '✓' },\n      deploying: { label: 'Deploying', color: LIVE,  glyph: '⟳' },\n      queued:    { label: 'Queued',    color: QUEUE, glyph: '•' },\n      blocked:   { label: 'Blocked',   color: RED,   glyph: '!' }\n    };\n\n    // ---------- releases (scoped to the selected pipeline) ----------\n    const releases = cfg.releases || [];\n    const sel = releases.length ? Math.min(this.state.selectedRelease || 0, releases.length - 1) : 0;\n    const release = releases[sel] || { name: '—', source: '—', items: [] };\n\n    const releaseTabs = releases.map((r, i) => {\n      const active = i === sel;\n      const blk = r.items.filter(it => it.st === 'blocked').length;\n      return {\n        key: r.key, name: r.name, active,\n        style: 'display:flex;align-items:center;gap:8px;cursor:pointer;font-family:\\'Outfit\\',sans-serif;font-size:12.5px;font-weight:600;border-radius:9px;padding:8px 13px;transition:all .15s;' +\n          (active\n            ? 'color:var(--text);background:rgba(79,182,232,.16);border:1px solid rgba(79,182,232,.5);'\n            : 'color:var(--muted);background:transparent;border:1px solid rgba(255,255,255,.1);'),\n        dotStyle: 'width:7px;height:7px;border-radius:50%;background:' + (blk > 0 ? RED : DONE) + ';',\n        onClick: () => this.selectRelease(i),\n        onKey: this.keyAct(() => this.selectRelease(i))\n      };\n    });\n\n    // ---------- work items (search / find your work) ----------\n    const q = (this.state.query || '').trim().toLowerCase();\n    const allItems = release.items.map(it => {\n      const meta = WI[it.st] || WI.queued;\n      const srcColor = it.source === 'Jira' ? '#2684FF' : '#00A1E0';\n      return {\n        key: it.id, id: it.id, title: it.title, type: it.type, source: it.source,\n        reason: it.reason || '',\n        stateLabel: meta.label,\n        badgeStyle: 'display:inline-flex;align-items:center;gap:5px;font-family:\\'Outfit\\',sans-serif;font-size:10.5px;font-weight:600;color:' + meta.color + ';background:' + meta.color + '1e;border:1px solid ' + meta.color + '55;border-radius:6px;padding:2px 8px;',\n        glyph: meta.glyph,\n        srcStyle: 'font-family:\\'JetBrains Mono\\',monospace;font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:' + srcColor + ';background:' + srcColor + '1c;border:1px solid ' + srcColor + '44;border-radius:5px;padding:2px 6px;'\n      };\n    });\n    const workItems = allItems.filter(it =>\n      !q || it.id.toLowerCase().includes(q) || it.title.toLowerCase().includes(q) || it.source.toLowerCase().includes(q)\n    );\n    const resultCount = workItems.length;\n    const noResults = q && resultCount === 0;\n\n    // ---------- glanceability summary ----------\n    const blockedItems = release.items.filter(it => it.st === 'blocked');\n    const attention = blockedItems.length > 0;\n    const summaryStyle = 'display:flex;align-items:center;gap:11px;border-radius:12px;padding:11px 18px;' +\n      (attention\n        ? 'background:rgba(200,16,46,.12);border:1px solid rgba(200,16,46,.45);'\n        : 'background:rgba(52,194,129,.12);border:1px solid rgba(52,194,129,.45);');\n    const summaryGlyphStyle = 'width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:\\'Outfit\\',sans-serif;font-weight:800;font-size:14px;color:#08131f;background:' + (attention ? RED : DONE) + ';';\n    const summaryGlyph = attention ? '!' : '✓';\n    const summaryText = attention\n      ? (blockedItems.length + (blockedItems.length === 1 ? ' item blocked' : ' items blocked') + ' · needs attention')\n      : 'All systems clear';\n    const summaryTextStyle = 'font-family:\\'Archivo\\',sans-serif;font-size:16px;font-weight:700;color:' + (attention ? badText : okText) + ';';\n\n    // ---------- freshness (global + per source) ----------\n    const secsAgo = Math.max(0, Math.floor((Date.now() - (this.state.lastSyncTs || Date.now())) / 1000));\n    const freshLabel = secsAgo < 3 ? 'Updated just now' : ('Updated ' + secsAgo + 's ago');\n    const srcColorOf = s => s === 'Jira' ? '#2684FF' : '#00A1E0';\n    const sourceSyncs = (cfg.sources || []).map((s, i) => ({\n      key: s, name: s, label: (secsAgo + i * 34) + 's',\n      chipStyle: 'display:inline-flex;align-items:center;gap:6px;font-family:\\'JetBrains Mono\\',monospace;font-size:10px;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:5px 10px;',\n      dotStyle: 'width:7px;height:7px;border-radius:50%;background:' + srcColorOf(s) + ';'\n    }));\n\n    // ---------- data state (loading / error / empty / live) ----------\n    const ds = this.props.dataState || 'live';\n    const isLive = ds === 'live';\n    const dataBannerText =\n      ds === 'loading' ? 'Loading live status from Jira and Salesforce…' :\n      ds === 'error'   ? 'Can’t reach a source — showing last known status. Retrying…' :\n      ds === 'empty'   ? 'No active releases. Connect a source or create a release to see the pipeline.' : '';\n    const dataBannerStyle = 'display:flex;align-items:center;gap:11px;border-radius:12px;padding:13px 18px;margin-bottom:22px;font-family:\\'Outfit\\',sans-serif;font-size:13px;font-weight:500;' +\n      (ds === 'error'\n        ? 'background:rgba(200,16,46,.1);border:1px solid rgba(200,16,46,.4);color:#F4B8C1;'\n        : ds === 'empty'\n        ? 'background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);'\n        : 'background:rgba(0,133,202,.1);border:1px solid rgba(79,182,232,.4);color:#9FD4F2;');\n    const showDataBanner = !isLive;\n    const isEmpty = ds === 'empty';\n    const showBoard = !isEmpty;\n\n    return {\n      now: this.state.now,\n      activeStage,\n      releaseTag: release.name,\n      showGates: this.props.showGates !== false,\n      splitting,\n      mainStations, branchStations, gates,\n      mainTrainStyle, trainTrainStyle, fixTrainStyle,\n      // selected pipeline detail (flexible per team)\n      hasFork, noFork, isSalesforce, showMergeNote,\n      detailName: cfg.name, detailSource: cfg.source,\n      detailDotStyle: 'width:10px;height:10px;border-radius:3px;background:' + cfg.color + ';',\n      // portfolio\n      portfolioCards, showBoard, isEmpty,\n      // release switcher\n      releaseTabs, releaseName: release.name, releaseSource: release.source,\n      // glanceability\n      summaryStyle, summaryGlyph, summaryGlyphStyle, summaryText, summaryTextStyle,\n      // freshness\n      freshLabel, onRefresh: () => this.refreshNow(), onRefreshKey: this.keyAct(() => this.refreshNow()),\n      sourceSyncs,\n      // work items / finder\n      workItems, resultCount, noResults, query: this.state.query || '',\n      onSearch: (e) => this.onSearch(e),\n      // data state\n      showDataBanner, dataBannerText, dataBannerStyle\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
